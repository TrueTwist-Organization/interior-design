<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Interior Viewer</title>
    
    <!-- Pannellum Library -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <!-- Google Fonts for Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d12; /* Dark premium background */
            font-family: 'Outfit', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            color: #e2c044; /* Gold accent */
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* 
         * Exact Image Size & Container 
         * Matches screenshot style and user requests
         */
        .viewer-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            /* Gold accent border wrap */
            padding: 2px;
            background: linear-gradient(135deg, rgba(226, 192, 68, 0.4) 0%, rgba(226, 192, 68, 0.05) 50%, rgba(226, 192, 68, 0.4) 100%);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .viewer-container {
            width: 100%;
            max-width: 1200px;
            height: 640px;
            border-radius: 28px;
            overflow: hidden;
            margin: auto;
            background: #000;
            position: relative;
        }

        /* Responsive Heights */
        @media (min-width: 1440px) {
            .viewer-container {
                height: 700px; /* Desktop */
            }
        }
        
        @media (max-width: 1024px) {
            .viewer-container {
                height: 620px; /* Laptop */
            }
        }

        @media (max-width: 768px) {
            .viewer-container {
                height: 420px; /* Mobile */
            }
        }

        /* Image Quality Enforcement */
        .viewer-container img, 
        .viewer-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: auto;
            filter: none;
        }

        /* Download Button */
        .download-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #0d0d12;
            background: linear-gradient(135deg, #e2c044 0%, #f0d878 50%, #e2c044 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(226, 192, 68, 0.35);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(226, 192, 68, 0.5);
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(226, 192, 68, 0.3);
        }

        .download-btn svg {
            transition: transform 0.3s ease;
        }

        .download-btn:hover svg {
            transform: translateY(2px);
        }

        /* Hide Pannellum's default UI to keep it clean and premium */
        .pnlm-ui {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1>Premium Interactive Viewing</h1>

    <div class="viewer-wrapper">
        <div id="panorama" class="viewer-container">
        </div>
    </div>

    <!-- Download Button -->
    <div class="download-wrapper">
        <button class="download-btn" id="btn-download" title="Download Image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
        </button>
    </div>

    <script>
        /**
         * Smart Logic Initialization
         * Configured explicitly for flat image to prevent distortion,
         * with cinematic smooth transitions.
         */
        const viewerConfig = {
            "type": "equirectangular",
            "panorama": "YOUR_SECOND_IMAGE.jpg", // Using exact second image
            "autoLoad": true,
            
            // --- SMART MAPPING FOR FLAT IMAGES ---
            // These properties stop the image from stretching 360 degrees
            "haov": 80,       // Horizontal angle (image width)
            "vaov": 45,       // Vertical angle (image height, 16:9 ratio)
            "vOffset": 0,
            
            // --- PERFECT ROOM VIEW ---
            // Start by showing the full image beautifully
            "hfov": 80,
            
            // Zoom Limits
            "minHfov": 40,    // Allow zooming in deeply into the room
            "maxHfov": 80,    // Prevent zooming out into black space
            
            // Rotation Limits (Prevent circular distortion)
            // Allow panning primarily when zoomed in
            "minYaw": -15,
            "maxYaw": 15,
            "minPitch": -8,
            "maxPitch": 8,
            
            // UI & Interaction
            "showControls": false, // We use our premium overlay
            "mouseZoom": true,     // Scroll zoom enabled
            "keyboardZoom": true,  // Arrow keys enabled implicitly by Pannellum
            "friction": 0.15       // Smooth transitions and cinematic drag
        };

        const viewer = pannellum.viewer('panorama', viewerConfig);

        // Download functionality
        document.getElementById('btn-download').addEventListener('click', () => {
            const imageUrl = viewerConfig.panorama;
            
            // Create a temporary link to trigger download
            const link = document.createElement('a');
            link.href = imageUrl;
            link.download = imageUrl.split('/').pop() || 'interior-design.jpg';
            link.target = '_blank';
            
            // For cross-origin images, use fetch + blob approach
            fetch(imageUrl)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    link.href = blobUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                })
                .catch(() => {
                    // Fallback: direct link download
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
        });
    </script>
</body>
</html>
